<ui:composition template="/WEB-INF/includes/layout.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:c="jakarta.tags.core"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:fn="jakarta.tags.functions">
<ui:define name="title">#{post != null ? 'Edit Post' : 'Write a Story'} – ThoughtSync</ui:define>
<ui:define name="content">

    <div class="container" style="padding-top: 40px; padding-bottom: 60px;">
        <div class="page-header" style="border-bottom: none; margin-bottom: 20px;">
            <a href="#{request.contextPath}/dashboard" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 5px;">
                ← Back to Dashboard
            </a>
        </div>

        <div class="post-form-grid">
            <div class="card" style="padding: 40px;">
                <h1 style="font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 30px; color: #fff;">
                    #{post != null ? 'Edit Your Story' : 'Write a New Story'}
                </h1>

                <form method="post" action="#{request.contextPath}/post/" id="postForm" enctype="multipart/form-data">
                    <input type="hidden" name="action" value="#{post != null ? 'update' : 'create'}" />
                    <c:if test="#{post != null}">
                        <input type="hidden" name="postId" value="#{post.postId}" />
                    </c:if>

                    <div class="form-group">
                        <label for="title" style="font-size: 1.1rem; color: #fff;">Story Title</label>
                        <input type="text" id="title" name="title" value="#{post != null ? post.title : ''}"
                               style="font-size: 1.5rem; padding: 16px 20px; font-weight: 600; font-family: 'Playfair Display', serif;"
                               placeholder="Enter a captivating title..." required="required" />
                    </div>

                    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
                    <style>
                        .ql-toolbar {
                            background: rgba(255, 255, 255, 0.05);
                            border: 1px solid var(--border-color) !important;
                            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
                        }
                        .ql-container {
                            background: rgba(255, 255, 255, 0.03);
                            border: 1px solid var(--border-color) !important;
                            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
                            min-height: 380px;
                            font-size: 1.1rem;
                            color: var(--text-main);
                            font-family: inherit;
                        }
                        .ql-editor::placeholder {
                            color: var(--text-muted);
                        }
                        .ql-stroke {
                            stroke: var(--text-muted) !important;
                        }
                        .ql-fill {
                            fill: var(--text-muted) !important;
                        }
                        .ql-picker {
                            color: var(--text-muted) !important;
                        }
                        .ql-picker-options {
                            background-color: var(--card-bg-solid) !important;
                            border-color: var(--border-color) !important;
                        }
                        [data-theme="light"] .ql-toolbar {
                            background: rgba(0, 0, 0, 0.02);
                        }
                        [data-theme="light"] .ql-container {
                            background: #ffffff;
                        }
                    </style>
                    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

                    <div class="form-group" style="margin-top: 30px;">
                        <label for="content" style="font-size: 1.1rem; color: #fff;">Story Content</label>
                        <textarea id="content" name="content" style="display:none;">#{post != null ? post.content : ''}</textarea>
                        <div id="editor-container"></div>
                    </div>

                    <script>//<![CDATA[
                    document.addEventListener('DOMContentLoaded', function() {
                        const quill = new Quill('#editor-container', {
                            theme: 'snow',
                            placeholder: 'Tell your story...',
                            modules: {
                                toolbar: [
                                    [{ 'header': [1, 2, 3, false] }],
                                    ['bold', 'italic', 'underline', 'strike'],
                                    ['blockquote', 'code-block'],
                                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                    ['link', 'clean']
                                ]
                            }
                        });

                        const contentTextarea = document.getElementById('content');
                        if (contentTextarea && contentTextarea.value) {
                            quill.root.innerHTML = contentTextarea.value;
                        }

                        const form = document.getElementById('postForm');
                        form.addEventListener('submit', function(e) {
                            const html = quill.root.innerHTML;
                            const text = quill.getText().trim();
                            if (text.length === 0) {
                                alert('Please write some content for your story!');
                                e.preventDefault();
                                return;
                            }
                            contentTextarea.value = html;
                        });
                    });
                    //]]></script>
                </form>
            </div>

            <div class="sidebar">
                <div class="card" style="padding: 24px;">
                    <h3 style="font-size: 1.1rem; color: #fff; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">
                        Post Settings
                    </h3>

                    <div class="form-group">
                        <label for="categoryId">Category</label>
                        <select id="categoryId" name="categoryId" form="postForm" required="required">
                            <option value="">Select a category...</option>
                            <c:forEach var="category" items="#{categories}">
                                <option value="#{category.categoryId}"
                                        selected="#{post != null and post.category != null and post.category.categoryId == category.categoryId ? 'selected' : null}">
                                    #{category.categoryName}
                                </option>
                            </c:forEach>
                        </select>
                    </div>

                    <div class="form-group" style="margin-top: 25px;">
                        <label for="tags">Tags (comma separated)</label>
                        <input type="text" id="tags" name="tags" form="postForm" value="#{tagsString}" placeholder="e.g. tech, coding, java" style="padding: 10px; border-radius: var(--radius-sm);" />
                    </div>

                    <div class="form-group" style="margin-top: 30px;">
                        <label>Featured Image Upload</label>
                        <c:if test="#{not empty post.featuredImage}">
                            <div style="margin-bottom: 10px;">
                                <img src="#{request.contextPath}/#{post.featuredImage}" alt="Current Image" style="width: 100%; border-radius: 8px; border: 1px solid var(--border-color);" />
                            </div>
                        </c:if>
                        <input type="file" name="featuredImageFile" form="postForm" accept="image/png, image/jpeg, image/gif"
                               style="background: transparent; border: 1px dashed var(--border-color); padding: 12px; cursor: pointer;" />
                        <small style="color: var(--text-muted); display: block; margin-top: 6px; font-size: 0.8rem;">Upload a new image (Max 10MB).</small>
                    </div>

                    <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                        <button type="submit" form="postForm" class="btn" style="width: 100%; margin-bottom: 12px;">
                            #{post != null ? '💾 Save Changes' : '🚀 Publish Story'}
                        </button>
                        <a href="#{request.contextPath}/dashboard" class="btn btn-outline" style="width: 100%; display: block; text-align: center;">
                            Cancel
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</ui:define>
</ui:composition>
