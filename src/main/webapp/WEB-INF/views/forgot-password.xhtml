<ui:composition template="/WEB-INF/includes/layout.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:c="jakarta.tags.core"
    xmlns:h="jakarta.faces.html">
<ui:define name="title">Reset Password – ThoughtSync</ui:define>
<ui:define name="content">

<div class="auth-page">
    <div class="auth-card">
        <h2>Forgot Password</h2>
        <p class="auth-sub">Enter your email address to receive a password reset link</p>

        <c:if test="#{not empty requestScope.error}">
            <div class="alert alert-error">⚠️ #{requestScope.error}</div>
        </c:if>
        <c:if test="#{not empty requestScope.success}">
            <div class="alert alert-success">✅ #{requestScope.success}</div>
        </c:if>

        <form method="post" action="#{request.contextPath}/forgot-password" id="forgotForm">
            <div class="form-group">
                <label for="email">Registered Email</label>
                <input type="email" id="email" name="email"
                       placeholder="Enter your registered email"
                       required="required" />
            </div>

            <button type="submit" class="btn">Send Reset Link →</button>
        </form>

        <div class="auth-footer" style="margin-top: 25px;">
            Remembered your password? <a href="#{request.contextPath}/login">Sign In →</a>
        </div>
    </div>
</div>

</ui:define>
</ui:composition>
