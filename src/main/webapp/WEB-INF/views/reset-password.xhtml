<ui:composition template="/WEB-INF/includes/layout.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:c="jakarta.tags.core"
    xmlns:h="jakarta.faces.html">
<ui:define name="title">Reset Password – ThoughtSync</ui:define>
<ui:define name="content">

<div class="auth-page">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <p class="auth-sub">Enter your new password below to reset it</p>

        <c:if test="#{not empty requestScope.error}">
            <div class="alert alert-error">⚠️ #{requestScope.error}</div>
        </c:if>

        <form method="post" action="#{request.contextPath}/reset-password" id="resetForm" onsubmit="return validateResetForm()">
            <!-- Keep token in a hidden field to post it back -->
            <input type="hidden" name="token" value="#{requestScope.token != null ? requestScope.token : param.token}" />

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword"
                       placeholder="Enter new password"
                       required="required" />
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword"
                       placeholder="Confirm new password"
                       required="required" />
            </div>

            <button type="submit" class="btn">Reset Password →</button>
        </form>

        <script>//<![CDATA[
            function validateResetForm() {
                const pass = document.getElementById('newPassword').value;
                const conf = document.getElementById('confirmPassword').value;
                if (pass.length < 6) {
                    alert("Password must be at least 6 characters long.");
                    return false;
                }
                if (pass !== conf) {
                    alert("Passwords do not match!");
                    return false;
                }
                return true;
            }
        //]]></script>

        <div class="auth-footer" style="margin-top: 25px;">
            Remembered your password? <a href="#{request.contextPath}/login">Sign In →</a>
        </div>
    </div>
</div>

</ui:define>
</ui:composition>
