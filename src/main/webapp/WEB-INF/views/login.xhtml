<ui:composition template="/WEB-INF/includes/layout.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:c="jakarta.tags.core"
    xmlns:h="jakarta.faces.html">
<ui:define name="title">Login – ThoughtSync</ui:define>
<ui:define name="content">

<div class="auth-page">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-sub">Sign in to continue to ThoughtSync</p>

        <c:if test="#{not empty requestScope.error}">
            <div class="alert alert-error">⚠️ #{requestScope.error}</div>
        </c:if>
        <c:if test="#{not empty requestScope.success}">
            <div class="alert alert-success">✅ #{requestScope.success}</div>
        </c:if>

        <form method="post" action="#{request.contextPath}/login" autocomplete="on">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter your username or email"
                       value="#{param.username}"
                       autocomplete="username" required="required" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password"
                           placeholder="Enter your password"
                           autocomplete="current-password" required="required" />
                    <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn">Sign In →</button>
        </form>

        <script>//<![CDATA[
            function togglePassword(inputId, btn) {
                const input = document.getElementById(inputId);
                input.type = input.type === 'password' ? 'text' : 'password';
            }
        //]]></script>

        <div class="auth-divider">or continue with</div>

        <a href="#{request.contextPath}/login/google" class="btn btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" />
            Continue with Google
        </a>

        <div class="auth-footer">
            Don't have an account? <a href="#{request.contextPath}/register">Create one free →</a>
        </div>
    </div>
</div>

</ui:define>
</ui:composition>
