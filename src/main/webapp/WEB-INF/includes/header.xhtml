<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:c="jakarta.tags.core"
    xmlns:fn="jakarta.tags.functions">
<header>
    <nav class="container">
        <a href="#{request.contextPath}/" class="nav-brand">✍️ ThoughtSync</a>
        <ul>
            <li><a href="#{request.contextPath}/">Home</a></li>
            <li><a href="#{request.contextPath}/post/">Blog</a></li>
            <c:choose>
                <c:when test="#{not empty sessionScope.user}">
                    <li><a href="#{request.contextPath}/dashboard">Dashboard</a></li>
                    <c:if test="#{sessionScope.role == 'ADMIN'}">
                        <li><a href="#{request.contextPath}/admin">Admin</a></li>
                    </c:if>
                    <li style="display: flex; align-items: center; margin-left: 10px;">
                        <a href="#{request.contextPath}/profile" class="nav-avatar" title="My Profile"
                           style="padding: 0; display: inline-flex; align-items: center; justify-content: center; overflow: hidden;">
                            <c:choose>
                                <c:when test="#{not empty sessionScope.user.profilePicture}">
                                    <img src="#{request.contextPath}/#{sessionScope.user.profilePicture}" alt="Avatar"
                                         style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />
                                </c:when>
                                <c:otherwise>
                                    #{fn:substring(not empty sessionScope.user.fullName ? sessionScope.user.fullName : sessionScope.user.username, 0, 1).toUpperCase()}
                                </c:otherwise>
                            </c:choose>
                        </a>
                    </li>
                    <li style="margin-left: 15px;">
                        <a href="#{request.contextPath}/logout" class="btn btn-outline btn-sm"
                           style="padding: 6px 14px; color: var(--text-color); border-color: rgba(255,255,255,0.2);">Logout</a>
                    </li>
                </c:when>
                <c:otherwise>
                    <li><a href="#{request.contextPath}/login">Login</a></li>
                    <li><a href="#{request.contextPath}/register" class="nav-register">Register</a></li>
                </c:otherwise>
            </c:choose>
        </ul>
    </nav>
</header>
</ui:composition>
